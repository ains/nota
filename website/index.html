<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nota — Music transcription helper</title>
    <meta
      name="description"
      content="A pretty, simple cross-platform application for musicians to transcribe music."
    />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />

    <!-- Social link previews -->
    <meta property="og:title" content="Nota" />
    <meta
      property="og:description"
      content="A pretty, simple cross-platform application for musicians to transcribe music."
    />
    <meta property="og:image" content="screenshot.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <style>
      :root {
        --paper: #f4f2ec;
        --bg-panel: #fbfaf6;
        --bg-lane: #ffffff;
        --border: #d6d3c8;
        --ink: #15140f;
        --text: #15140f;
        --text-dim: #8a877b;
        --serif:
          "Hoefler Text", "Iowan Old Style", Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }
      html {
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      body {
        margin: 0;
        background: var(--paper);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        line-height: 1.6;
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: clamp(3.5rem, 10vw, 7rem) 1.5rem 3rem;
      }

      header {
        text-align: center;
      }
      /* Serif title + faded sans subtitle — mirrors the app's Library screen. */
      h1 {
        margin: 0;
        font-family: var(--serif);
        font-size: clamp(3rem, 11vw, 5.5rem);
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .tagline {
        margin: 1rem auto 0;
        max-width: 32ch;
        font-size: clamp(1.05rem, 2.4vw, 1.35rem);
        color: var(--text-dim);
      }

      /* Buttons — Nota's house style: sharp corners, a 1px ink rule, monochrome
         fill, and the engraved offset shadow the app uses on its cards. Mirrors
         `button` / `button.primary` in the app theme. */
      .btn {
        display: inline-block;
        border: 1px solid var(--ink);
        border-radius: 0;
        background: var(--bg-panel);
        color: var(--text);
        font: inherit;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease,
          background 0.12s ease,
          color 0.12s ease;
      }

      /* Primary, filled ink — the app's `.primary`, scaled up for a hero CTA.
         Hovering lifts it and casts the hard offset ink shadow; pressing it
         sets it back flat. */
      .btn-primary {
        padding: 0.85rem 1.9rem;
        font-size: 1.05rem;
        background: var(--ink);
        color: var(--bg-lane);
      }
      .btn-primary:hover,
      .btn-primary:focus-visible {
        transform: translate(-2px, -2px);
        box-shadow: 4px 4px 0 var(--ink);
      }
      .btn-primary:active {
        transform: translate(0, 0);
        box-shadow: none;
      }

      /* Secondary, outline — the app's default button: fills with ink on hover. */
      .btn-ghost {
        padding: 0.5rem 1.1rem;
        font-size: 0.9rem;
      }
      .btn-ghost:hover,
      .btn-ghost:focus-visible {
        background: var(--ink);
        color: var(--bg-lane);
      }

      .cta {
        margin-top: 2.75rem;
      }
      .meta {
        margin-top: 0.9rem;
        font-size: 0.85rem;
        color: var(--text-dim);
      }

      .shot {
        margin: clamp(3rem, 8vw, 5rem) 0 0;
      }
      .shot img {
        display: block;
        width: 100%;
        height: auto;
      }

      footer {
        margin-top: clamp(3rem, 8vw, 5rem);
        padding-top: 2rem;
        border-top: 1px solid var(--border);
        text-align: center;
      }
    </style>
  </head>

  <body>
    <main class="wrap">
      <header>
        <h1>Nota</h1>
        <p class="tagline">
          A pretty, simple cross-platform application for musicians to
          transcribe music.
        </p>

        <div class="cta">
          <a class="btn btn-primary" href="%DOWNLOAD_URL%"
            >Download for macOS</a
          >
          <p class="meta">For macOS · Apple silicon</p>
        </div>
      </header>

      <figure class="shot">
        <img
          src="screenshot.png"
          alt="Nota showing an audio waveform, timeline, and piano roll while transcribing a recording."
          width="3824"
          height="2254"
        />
      </figure>

      <footer>
        <a class="btn btn-ghost" href="https://github.com/ains/nota"
          >View the source on GitHub</a
        >
      </footer>
    </main>
  </body>
</html>
