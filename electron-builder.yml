appId: com.ains.nota
productName: Nota
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!**/.claude/*"
  - "!src/*"
  - "!dist/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
asarUnpack:
  - resources/**
electronLanguages:
  - en-US
# A Nota project is a directory named "*.nota". On macOS, isPackage marks it as
# a document package (LSTypeIsPackage) so Finder shows it as a single
# double-clickable file; double-clicking delivers the path via the open-file
# event. On Windows/Linux it remains an ordinary folder.
fileAssociations:
  - ext: nota
    name: Nota Project
    role: Editor
    rank: Owner
    isPackage: true
win:
  executableName: nota
  icon: resources/icon.ico
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  icon: resources/icon.icns
  # Hardened Runtime + entitlements are prerequisites for notarization.
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  # dmg for humans; zip drives auto-update + generates latest-mac.yml.
  target:
    - dmg
    - zip
  extendInfo:
    - NSMicrophoneUsageDescription: Nota needs the microphone to record your performance against the track.
    - NSDocumentsFolderUsageDescription: Nota needs access to open and save your projects.
    - NSDownloadsFolderUsageDescription: Nota needs access to open and save your projects.
  # Notarization runs only when Apple credentials are present in the env
  # (i.e. in CI via the Release workflow); local builds skip it automatically.
  notarize: true
dmg:
  # ${arch} keeps the arm64 and x64 DMGs from colliding.
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  icon: resources/icon.png
  target:
    - AppImage
    - snap
    - deb
  maintainer: Ainsley Escorce-Jones <me@ains.co>
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: ains
  repo: nota
