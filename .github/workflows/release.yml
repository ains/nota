name: Release

# Build the desktop apps and upload them to a single draft GitHub Release:
#   - macOS:   signed + notarized .dmg/.zip (needs the Apple secrets below)
#   - Windows: NSIS installer .exe (signing optional — see below)
#
# The Windows job runs *after* the macOS job (needs: release). electron-builder
# creates the draft release on the macOS run, so the Windows run just finds and
# reuses that same draft — one release per tag, with no race to create two
# drafts. electron-builder publishes to a *draft* by default, so artifacts are
# uploaded but nothing is public until you review and click "Publish" on the
# release page. Re-run the Windows job from the Actions tab if macOS flaked.
#
# Triggered by pushing a version tag, e.g.:
#
#   npm version 1.2.3   # bumps package.json + creates the tag
#   git push --follow-tags
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#
#   macOS signing + notarization (the macOS job needs all of these):
#     CSC_LINK              Base64 of your "Developer ID Application" cert (.p12).
#                            Export from Keychain, then: base64 -i cert.p12 | pbcopy
#     CSC_KEY_PASSWORD      Password you set when exporting that .p12.
#     APPLE_API_KEY_BASE64  Base64 of your App Store Connect API key (.p8):
#                            base64 -i AuthKey_XXXXXXXXXX.p8 | pbcopy
#     APPLE_API_KEY_ID      The key's 10-char Key ID (e.g. ABCDE12345).
#     APPLE_API_ISSUER      The Issuer ID (UUID) shown above the keys list.
#     APPLE_TEAM_ID         Your 10-char Apple Developer Team ID.
#
#   Windows signing (OPTIONAL — omit to ship an unsigned installer, which works
#   but shows a SmartScreen warning until the certificate builds reputation):
#     WINDOWS_CSC_LINK          Base64 of your Authenticode cert (.pfx/.p12):
#                                base64 -i cert.pfx | pbcopy
#     WINDOWS_CSC_KEY_PASSWORD  Password for that cert.
#
# GITHUB_TOKEN is provided automatically; `permissions: contents: write` lets
# it create the release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  release:
    name: Build, sign & notarize (macOS)
    runs-on: macos-latest
    # Generous: a cold cargo build of demucs-cli alone can take ~20 minutes.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Rust is preinstalled on GitHub-hosted runners. Cache cargo's registry
      # and the demucs target dir so rebuilding the pinned revision is cheap;
      # bump the key's version alongside DEMUCS_RS_REF in the build script.
      - name: Cache demucs-rs build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            .cache/demucs-rs-target
          key: demucs-cli-v0.3.4-${{ runner.os }}-${{ runner.arch }}

      # Stages the native Rust stem separator at resources/demucs/, which
      # electron-builder ships asar-unpacked. Required for releases: without
      # it the packaged app would silently fall back to WebGPU separation.
      - name: Build native demucs CLI
        run: npm run build:demucs

      # @electron/notarize wants a *path* to the .p8 key, so materialize the
      # base64 secret to a file and point APPLE_API_KEY at it for later steps.
      - name: Stage App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/apple_api_key.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, notarize & publish
        env:
          DEBUG: "electron-builder,electron-osx-sign*,electron-notarize*"
          # Code-signing identity (Developer ID Application).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization via App Store Connect API key. APPLE_API_KEY (the path)
          # is exported into $GITHUB_ENV by the previous step.
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Lets electron-builder create the draft release and upload assets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # `npm run build` typechecks then runs electron-vite build into out/.
        # electron-builder then packages arm64 + x64 and publishes the result.
        run: |
          npm run build
          npx electron-builder --mac --arm64 --publish onTag

  release-windows:
    name: Build & publish (Windows)
    # Wait for the macOS job so the draft release already exists: electron-builder
    # creates it there, and this run finds and reuses the same draft instead of
    # racing to create a second one for the tag.
    needs: release
    runs-on: windows-latest
    # Generous: a cold cargo build of demucs-cli alone can take ~20 minutes.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Mirror the macOS job: build the native Rust stem separator so the
      # Windows package bundles it too (see that job for cache-key notes).
      - name: Cache demucs-rs build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            .cache/demucs-rs-target
          key: demucs-cli-v0.3.4-${{ runner.os }}-${{ runner.arch }}

      - name: Build native demucs CLI
        run: npm run build:demucs

      - name: Build & publish
        # Use bash (Git Bash ships on the runner) so `set -e` stops the step if
        # the build fails, instead of falling through to the package step.
        shell: bash
        env:
          DEBUG: "electron-builder"
          # Optional Authenticode signing. When these secrets are unset, CSC_LINK
          # is empty and electron-builder builds an unsigned installer.
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
          # Lets electron-builder upload assets to the draft release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Mirror the macOS job: typecheck + electron-vite build into out/, then
        # package the NSIS x64 installer and publish it to the same draft release.
        run: |
          npm run build
          npx electron-builder --win --x64 --publish onTag
