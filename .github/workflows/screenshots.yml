name: Screenshots

on: pull_request

permissions:
  contents: write # push the ci-screenshots branch
  pull-requests: write # post/update the sticky comment

jobs:
  screenshots:
    name: Render & capture UI
    runs-on: ubuntu-latest
    env:
      # We only render the renderer in a browser, never the packaged app, so
      # skip the ~100MB Electron binary download during `npm ci`.
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start web dev server
        run: npm run dev:web &

      - name: Capture screenshots
        run: npm run screenshots

      - name: Publish screenshots to ci-screenshots branch
        id: publish
        # Forks get a read-only GITHUB_TOKEN, so skip the push + comment there.
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          dest="pr-${PR_NUMBER}/${HEAD_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check out (or create) the orphan branch in a separate worktree.
          if git ls-remote --exit-code --heads origin ci-screenshots >/dev/null 2>&1; then
            git fetch origin ci-screenshots
            git worktree add ../ss ci-screenshots
          else
            git worktree add --detach ../ss
            git -C ../ss checkout --orphan ci-screenshots
            git -C ../ss reset --hard
            git -C ../ss clean -fdx
          fi

          mkdir -p "../ss/${dest}"
          cp screenshots/library.png "../ss/${dest}/"
          cp screenshots/project.png "../ss/${dest}/"
          cp screenshots/project-piano-roll.png "../ss/${dest}/"

          git -C ../ss add "${dest}"
          git -C ../ss commit -m "Screenshots for PR #${PR_NUMBER} @ ${HEAD_SHA}"
          git -C ../ss push origin ci-screenshots
          echo "dest=${dest}" >> "$GITHUB_OUTPUT"

      - name: Post screenshots comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          DEST: ${{ steps.publish.outputs.dest }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const dest = process.env.DEST;
            const issue_number = context.payload.pull_request.number;
            const marker = "<!-- nota-screenshots -->";
            const raw = (name) =>
              `https://raw.githubusercontent.com/${owner}/${repo}/ci-screenshots/${dest}/${name}`;
            const body = [
              marker,
              "## 📸 UI screenshots",
              `Rendered from \`${context.payload.pull_request.head.sha}\`.`,
              "",
              "### Library",
              `![Library](${raw("library.png")})`,
              "",
              "### Project",
              `![Project](${raw("project.png")})`,
              "",
              "### Project + Piano Roll",
              `![Project with piano roll](${raw("project-piano-roll.png")})`,
            ].join("\n");

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number },
            );
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
