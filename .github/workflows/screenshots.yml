name: Screenshots

on: pull_request

permissions:
  contents: read
  pull-requests: write # post/update the sticky comment

jobs:
  screenshots:
    name: Render & capture UI
    runs-on: ubuntu-latest
    env:
      # We only render the renderer in a browser, never the packaged app, so
      # skip the ~100MB Electron binary download during `npm ci`.
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start web dev server
        run: npm run dev:web &

      - name: Capture screenshots
        run: npm run screenshots

      # The artifact runtime token is injected into JS actions but not plain
      # `run:` steps, so bridge it (and the results URL) into the job env for
      # the @actions/artifact client to read.
      - name: Expose artifact runtime env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable(
              "ACTIONS_RUNTIME_TOKEN",
              process.env.ACTIONS_RUNTIME_TOKEN,
            );
            core.exportVariable(
              "ACTIONS_RESULTS_URL",
              process.env.ACTIONS_RESULTS_URL,
            );

      - name: Upload screenshots artifact
        id: upload
        run: node scripts/upload-artifact.mjs

      - name: Post screenshots comment
        # Forks get a read-only GITHUB_TOKEN, so skip the comment there.
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = "<!-- nota-screenshots -->";
            const body = [
              marker,
              "## 📸 UI screenshots",
              `Rendered from \`${process.env.HEAD_SHA}\` — Library, Project, and Project + Piano Roll.`,
              "",
              "Private repo, so images can't render inline. Download them from the workflow run:",
              "",
              `**[⬇️ ui-screenshots artifact](${process.env.ARTIFACT_URL})**`,
            ].join("\n");

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number },
            );
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
